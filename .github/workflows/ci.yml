name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt
        pip install pytest pytest-cov

    - name: Lint with flake8 (if available)
      run: |
        pip install flake8 || true
        flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics || true

    - name: Test with pytest
      env:
        # Fake broker + LLM keys — Settings() requires ALPACA_* at import time
        # (Field(...) with no default), so without these every test module
        # import raises ValidationError before the tests even run. CI has no
        # .env since edcba88 gitignored it. LLM keys are similarly required
        # by any test that touches an advisor code path.
        ALPACA_API_KEY: fake
        ALPACA_SECRET_KEY: fake
        GROQ_API_KEY: fake
        OPENAI_API_KEY: fake
        ANTHROPIC_API_KEY: fake
      run: |
        pytest --cov=app --cov-report=xml --cov-report=term-missing

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      if: matrix.python-version == '3.12'  # only once
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}  # optional

  # Optional: build check
  build:
    runs-on: ubuntu-latest
    env:
      # Same reason as the test job — Settings() needs these to import.
      ALPACA_API_KEY: fake
      ALPACA_SECRET_KEY: fake
      GROQ_API_KEY: fake
      OPENAI_API_KEY: fake
      ANTHROPIC_API_KEY: fake
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - run: |
        pip install -r requirements.txt
        python -c "import app.main; print('Import OK')"
        python -m py_compile app/main.py
