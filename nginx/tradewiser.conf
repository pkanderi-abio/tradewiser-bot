# /etc/nginx/sites-available/tradewiser
# Place this file and enable it:
#   sudo ln -s /etc/nginx/sites-available/tradewiser /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;   # Change to your domain or IP

    # Optional: redirect HTTP -> HTTPS
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running trading operations
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Protect sensitive endpoints if desired
    # location /trades/ {
    #     auth_basic "TradeWiser";
    #     auth_basic_user_file /etc/nginx/.htpasswd;
    #     proxy_pass http://127.0.0.1:8000;
    #     proxy_set_header Host $host;
    #     # ... other headers
    # }
}

